# https://github.com/actions/deploy-pages#usage
name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site
          cp -r packages/experiment-01 _site/
          cp -r packages/experiment-02 _site/
          cp -r packages/experiment-03-hinatabokko _site/
          cp -r packages/experiment-04-mono-no-aware _site/
          cp -r packages/experiment-05-komorebi _site/
          cp -r packages/experiment-06-ikigai _site/
          cp -r packages/experiment-07-wabi-sabi _site/
          cp -r packages/experiment-08-ichigo-ichie _site/
          cp -r packages/experiment-09-kintsugi _site/
          cp -r packages/experiment-10-yugen _site/
          cp -r packages/experiment-11-natsukashii _site/
          cp -r packages/experiment-12-kokoro _site/
          cp -r packages/experiment-13-shoganai _site/
          cp -r packages/landing _site/
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=landing/">
          <link rel="canonical" href="landing/">
          <title>Redirecting to Experiments…</title>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
